          String fmt(double v) {
            if (v.abs() >= 100) return v.toStringAsFixed(0);
            if (v == v.roundToDouble()) return v.toStringAsFixed(0);
            return v.toStringAsFixed(1);
          }
          
          String rupiah(double v) {
            final s = v.round().toString();
            final buffer = StringBuffer();
            for (var i = 0; i < s.length; i++) {
              final left = s.length - i;
              buffer.write(s[i]);
              if (left > 1 && left % 3 == 1) buffer.write('.');
            }
            return buffer.toString();
          }
          
          String dayName(int weekday) {
            const names = ['', 'Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min'];
            return names[weekday];
          }
          
          String formatDate(String iso) {
            final dt = DateTime.tryParse(iso);
            if (dt == null) return '-';
            return '${dt.day.toString().padLeft(2, '0')}/${dt.month.toString().padLeft(2, '0')} ${dt.hour.toString().padLeft(2, '0')}:${dt.minute.toString().padLeft(2, '0')}';
          }
          
          EOF_MAIN
          cat > /tmp/ngr_icon.b64 <<'EOF_ICON'
          
          EOF_ICON
          base64 -d /tmp/ngr_icon.b64 > assets/ngr_icon.png

      - name: Get packages
        run: flutter pub get

      - name: Analyze source
        run: flutter analyze || true

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Collect APK
        shell: bash
        run: |
          set -e
          echo "Listing Flutter APK output..."
          find build -type f -name "*.apk" -print
          mkdir -p artifact
          cp build/app/outputs/flutter-apk/*.apk artifact/ || true
          cp build/app/outputs/apk/debug/*.apk artifact/ || true
          ls -lah artifact

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ngr-neo-debug-apk-v0-1-4
          path: artifact/*.apk
          if-no-files-found: error
